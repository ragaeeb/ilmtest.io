name: Maintainer Fixture Lane

on:
  workflow_dispatch:
    inputs:
      fixture:
        description: Fixture tier to materialize
        required: true
        default: medium
      preview_base_url:
        description: Optional deployed preview URL for cold/warm runtime probing
        required: false
        default: ""

jobs:
  maintainer:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Set up Node 25
        uses: actions/setup-node@v6
        with:
          node-version: "25"

      - name: Set up Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Materialize fixture corpus
        run: bun run setup-fixture -- ${{ inputs.fixture }}

      - name: Lint
        run: bun run lint

      - name: Typecheck
        run: bun run check

      - name: Test
        run: bun test

      - name: Integrity
        run: bun run integrity

      - name: Build project
        run: bun run build

      - name: Bundle check
        run: bun run bundle-check

      - name: Route smoke
        run: bun run smoke-routes -- --port 4323

      - name: Runtime probe (local)
        if: inputs.preview_base_url == ''
        run: bun run runtime-probe -- --port 4325 --output tmp/runtime-probe.json

      - name: Runtime probe (preview)
        if: inputs.preview_base_url != ''
        run: bun run runtime-probe -- --base-url "${{ inputs.preview_base_url }}" --output tmp/runtime-probe.json

      - name: Upload runtime probe artifact
        uses: actions/upload-artifact@v4
        with:
          name: runtime-probe-${{ inputs.fixture }}
          path: tmp/runtime-probe.json

      - name: Capture baseline snapshot
        run: bun run baseline

      - name: Upload baseline artifact
        uses: actions/upload-artifact@v4
        with:
          name: baseline-${{ inputs.fixture }}
          path: docs/baselines/current.json
