name: Contributor CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  contributor:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Set up Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Materialize tiny fixture corpus
        run: bun run setup-fixture -- tiny

      - name: Lint
        run: bun run lint

      - name: Typecheck
        run: bun run check

      - name: Test
        run: bun test --coverage --coverage-reporter=lcov

      - name: Integrity
        run: bun run integrity

      - name: Build project
        run: bun run build

      - name: Route smoke
        run: bun run smoke-routes -- --port 4322

      - name: Upload coverage reports to Codecov
        uses: codecov/codecov-action@v5
        with:
          token: ${{ secrets.CODECOV_TOKEN }}
