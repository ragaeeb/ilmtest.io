name: Release Corpus Lane

on:
  workflow_dispatch:
    inputs:
      collection_ids:
        description: Space-separated collection IDs for the full-corpus ETL run
        required: true
      publish_dataset:
        description: Publish the validated dataset after checks pass
        required: true
        default: "false"
      preview_base_url:
        description: Optional deployed preview URL for cold/warm runtime probing
        required: false
        default: ""

jobs:
  release:
    if: github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Set up Node 25
        uses: actions/setup-node@v6
        with:
          node-version: "25"

      - name: Set up Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Generate full corpus
        env:
          RELEASE_BUILD: "1"
        run: bun run setup ${{ inputs.collection_ids }}

      - name: Validate dataset inputs
        run: bun run validate-dataset

      - name: Lint
        run: bun run lint

      - name: Typecheck
        run: bun run check

      - name: Test
        run: bun test

      - name: Integrity
        run: bun run integrity

      - name: Build project
        run: bun run build

      - name: Bundle check
        run: bun run bundle-check

      - name: Route smoke
        run: bun run smoke-routes -- --port 4324

      - name: Runtime probe (local)
        if: inputs.preview_base_url == ''
        run: bun run runtime-probe -- --port 4326 --output tmp/runtime-probe.json

      - name: Runtime probe (preview)
        if: inputs.preview_base_url != ''
        run: bun run runtime-probe -- --base-url "${{ inputs.preview_base_url }}" --output tmp/runtime-probe.json

      - name: Upload runtime probe artifact
        uses: actions/upload-artifact@v4
        with:
          name: runtime-probe-release
          path: tmp/runtime-probe.json

      - name: Publish immutable dataset
        if: inputs.publish_dataset == 'true'
        run: bun run publish-dataset
